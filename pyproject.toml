[project]
name = "unlimited-ocr-portable"
version = "0.1.0"
description = "Portable Unlimited-OCR comparison harness"
requires-python = ">=3.12"
dependencies = [
    "pillow>=10",
    "pymupdf>=1.24",
    "requests>=2.31",
]

[project.scripts]
uocr-harness = "uocr_harness.cli:main"

[tool.hatch.build.targets.wheel]
packages = ["uocr_harness"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

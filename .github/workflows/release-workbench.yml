name: Release workbench

on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"

permissions:
  contents: read

jobs:
  validate_tag:
    name: Validate release tag
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - id: version
        name: Validate semver tag
        shell: bash
        run: |
          version="$GITHUB_REF_NAME"
          if [[ ! "$version" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[A-Za-z0-9._-]+)?$ ]]; then
            echo "Release tags must match vX.Y.Z or vX.Y.Z-suffix; got '$version'." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Release version $version"

  workbench_ci:
    name: Workbench CI
    needs: validate_tag
    uses: ./.github/workflows/workbench-ci.yml
    permissions:
      contents: read

  runtime:
    name: Build runtime binaries
    needs: validate_tag
    uses: ./.github/workflows/build-runtime.yml
    permissions:
      contents: write
    secrets: inherit
    with:
      publish: true
      version: ${{ needs.validate_tag.outputs.version }}

  package:
    name: ${{ matrix.name }}
    needs:
      - validate_tag
      - workbench_ci
      - runtime
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 zip
            platform: windows-x64
            runner: windows-2025
            preset: windows-workbench-ci
            archive_stem: uocr-workbench-windows-x64
            archive_ext: zip
            runtime_platform: windows-x86_64-cuda13
            additional_runtime_platforms: windows-x86_64-cpu
          - name: macOS arm64 zip
            platform: macos-arm64
            runner: macos-15
            preset: macos-arm64-workbench-ci
            archive_stem: uocr-workbench-macos-arm64
            archive_ext: zip
            runtime_platform: macos-arm64-metal
            additional_runtime_platforms: ""
          - name: Ubuntu 24.04 x64 tarball
            platform: linux-x64
            runner: ubuntu-24.04
            preset: linux-x64-workbench-ci
            archive_stem: uocr-workbench-linux-x64
            archive_ext: tar.gz
            runtime_platform: linux-x86_64-cuda13
            additional_runtime_platforms: linux-x86_64-cpu
          - name: Ubuntu 24.04 arm64 tarball
            platform: linux-arm64
            runner: ubuntu-24.04-arm
            preset: linux-arm64-workbench-ci
            archive_stem: uocr-workbench-linux-arm64
            archive_ext: tar.gz
            runtime_platform: linux-arm64-cpu
            additional_runtime_platforms: ""
    env:
      UOCR_RUNTIME_VERSION: ${{ needs.validate_tag.outputs.version }}
      UOCR_VERSION: ${{ needs.validate_tag.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
          submodules: recursive

      - name: Validate release version
        shell: bash
        run: |
          test -n "$UOCR_VERSION"
          echo "Release version $UOCR_VERSION"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Set up MSVC
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Ensure vcpkg on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          if (-not $env:VCPKG_ROOT) {
            $env:VCPKG_ROOT = "C:\vcpkg"
          }
          if (-not (Test-Path $env:VCPKG_ROOT)) {
            git clone https://github.com/microsoft/vcpkg "$env:VCPKG_ROOT"
            & "$env:VCPKG_ROOT\bootstrap-vcpkg.bat"
          }
          "VCPKG_ROOT=$env:VCPKG_ROOT" >> $env:GITHUB_ENV
          & "$env:VCPKG_ROOT\vcpkg.exe" version

      - name: Ensure vcpkg on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          if [[ -z "${VCPKG_ROOT:-}" ]]; then
            VCPKG_ROOT="$HOME/vcpkg"
          fi
          if [[ ! -d "$VCPKG_ROOT" ]]; then
            git clone https://github.com/microsoft/vcpkg "$VCPKG_ROOT"
            "$VCPKG_ROOT/bootstrap-vcpkg.sh"
          fi
          echo "VCPKG_ROOT=$VCPKG_ROOT" >> "$GITHUB_ENV"
          "$VCPKG_ROOT/vcpkg" version

      - name: Test React client
        working-directory: src/uocr-client
        shell: bash
        run: |
          bun install --frozen-lockfile
          bun run format:check
          bun run lint
          bun run test
          bun run typecheck
          bun run build
          bun run build-storybook

      - name: Package Windows workbench
        if: runner.os == 'Windows'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          .\scripts\windows\package-workbench.ps1 `
            -Preset "${{ matrix.preset }}" `
            -Version $env:UOCR_VERSION `
            -RuntimeVersion $env:UOCR_RUNTIME_VERSION `
            -RuntimePlatform "${{ matrix.runtime_platform }}" `
            -AdditionalRuntimePlatforms @("${{ matrix.additional_runtime_platforms }}")

      - name: Package macOS workbench
        if: runner.os == 'macOS'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          runtime_version="$UOCR_RUNTIME_VERSION"
          if [[ "$runtime_version" == "latest" ]]; then
            runtime_version="v0.0.7"
          fi
          bash scripts/mac/package-workbench.sh \
            --version "$UOCR_VERSION" \
            --runtime-version "$runtime_version" \
            --runtime-platform "${{ matrix.runtime_platform }}" \
            --preset "${{ matrix.preset }}"

      - name: Package Linux workbench
        if: runner.os == 'Linux'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          bash scripts/linux/package-workbench.sh \
            --version "$UOCR_VERSION" \
            --runtime-version "$UOCR_RUNTIME_VERSION" \
            --runtime-platform "${{ matrix.runtime_platform }}" \
            --additional-runtime-platforms "${{ matrix.additional_runtime_platforms }}" \
            --package-arch "${{ matrix.platform == 'linux-arm64' && 'arm64' || 'x64' }}" \
            --preset "${{ matrix.preset }}"

      - name: Test C++ server
        shell: bash
        run: |
          cmake --build "build/${{ matrix.preset }}" --config Release --target \
            uocr-platform-tests \
            uocr-core-tests \
            uocr-download-tests \
            uocr-render-tests \
            uocr-storage-tests \
            uocr-dependency-tests \
            uocr-realtime-tests
          ctest --test-dir "build/${{ matrix.preset }}" -C Release --output-on-failure

      - name: Smoke packaged server on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "dist\${{ matrix.archive_stem }}-$env:UOCR_VERSION.${{ matrix.archive_ext }}"
          if (-not (Test-Path $archive)) { throw "release archive was not produced: $archive" }
          $extract = Join-Path $env:RUNNER_TEMP "uocr-smoke"
          Remove-Item -LiteralPath $extract -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath $archive -DestinationPath $extract -Force
          $exe = Get-ChildItem -LiteralPath $extract -Recurse -Filter "uocr-server.exe" | Select-Object -First 1
          if (-not $exe) { throw "uocr-server.exe not found in archive" }
          if (Get-ChildItem -LiteralPath $extract -Recurse -Filter "mutool.exe" | Select-Object -First 1) {
            throw "mutool.exe should not be shipped; MuPDF must be linked into uocr-server"
          }
          & $exe.FullName --version
          $stdoutPath = Join-Path $env:RUNNER_TEMP "uocr-server.stdout.log"
          $stderrPath = Join-Path $env:RUNNER_TEMP "uocr-server.stderr.log"
          $process = Start-Process -FilePath $exe.FullName -ArgumentList "--port", "8766", "--no-browser" -WorkingDirectory $exe.Directory.FullName -RedirectStandardOutput $stdoutPath -RedirectStandardError $stderrPath -PassThru
          try {
            $health = $null
            for ($attempt = 1; $attempt -le 60; $attempt++) {
              $process.Refresh()
              if ($process.HasExited) { throw "uocr-server exited early with code $($process.ExitCode)" }
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:8766/api/health" -TimeoutSec 2
                if ($health.ok -eq $true) { break }
              } catch { Start-Sleep -Milliseconds 500 }
            }
            if ($health.ok -ne $true) { throw "health check failed" }
            Invoke-RestMethod -Uri "http://127.0.0.1:8766/api/status" -TimeoutSec 2 | Out-Null
            Invoke-WebRequest -Uri "http://127.0.0.1:8766/" -UseBasicParsing | Out-Null
            Invoke-RestMethod -Uri "http://127.0.0.1:8766/api/logs/recent?limit=20" -TimeoutSec 2 | Out-Null
            $logPath = Join-Path $exe.Directory.FullName "logs\uocr-server.log"
            if (-not (Test-Path $logPath)) { throw "server log was not created at $logPath" }
            if ((Get-Content -LiteralPath $logPath -Raw) -notmatch "listening http://127.0.0.1:8766/") {
              throw "server log did not record the listener URL"
            }
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Smoke packaged server on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="dist/${{ matrix.archive_stem }}-$UOCR_VERSION.${{ matrix.archive_ext }}"
          test -f "$archive"
          extract="$RUNNER_TEMP/uocr-smoke"
          rm -rf "$extract"
          mkdir -p "$extract"
          case "$archive" in
            *.zip) unzip -q "$archive" -d "$extract" ;;
            *.tar.gz) tar -xzf "$archive" -C "$extract" ;;
            *) echo "unsupported archive: $archive" >&2; exit 1 ;;
          esac
          exe="$(find "$extract" -name uocr-server -type f | head -n 1)"
          test -n "$exe"
          chmod +x "$exe"
          app_root="$(dirname "$exe")"
          if find "$app_root" -name mutool -type f | grep -q .; then
            echo "mutool should not be shipped; MuPDF must be linked into uocr-server" >&2
            exit 1
          fi
          test -d "$app_root/thirdparty/uocr-runtime/${{ matrix.runtime_platform }}"
          "$exe" --version
          stdout="$RUNNER_TEMP/uocr.stdout.log"
          stderr="$RUNNER_TEMP/uocr.stderr.log"
          (cd "$app_root" && LD_LIBRARY_PATH="$app_root:${LD_LIBRARY_PATH:-}" ./uocr-server --port 8767 --no-browser >"$stdout" 2>"$stderr") &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8767/api/health >/tmp/uocr-health.json; then
              break
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              cat "$stdout" "$stderr" || true
              exit 1
            fi
            sleep 0.5
          done
          curl -fsS http://127.0.0.1:8767/ >/tmp/uocr-home.html
          curl -fsS http://127.0.0.1:8767/api/status >/tmp/uocr-status.json
          curl -fsS "http://127.0.0.1:8767/api/logs/recent?limit=20" >/tmp/uocr-logs.json
          test -f "$app_root/data/uocr.duckdb"
          test -f "$app_root/logs/uocr-server.log"
          grep -q "listening http://127.0.0.1:8767/" "$app_root/logs/uocr-server.log"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: uocr-workbench-${{ matrix.platform }}-${{ env.UOCR_VERSION }}
          path: |
            dist/${{ matrix.archive_stem }}-${{ env.UOCR_VERSION }}.${{ matrix.archive_ext }}
            dist/${{ matrix.archive_stem }}-${{ env.UOCR_VERSION }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  package_trapo:
    name: Trapo ${{ matrix.name }}
    needs:
      - validate_tag
      - workbench_ci
      - runtime
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64 zip
            platform: windows-x64
            runner: windows-2025
            archive_stem: trapo-workbench-windows-x64
            archive_ext: zip
            runtime_platform: windows-x86_64-cuda13
            additional_runtime_platforms: windows-x86_64-cpu
          - name: Windows arm64 zip
            platform: windows-arm64
            runner: windows-11-arm
            archive_stem: trapo-workbench-windows-arm64
            archive_ext: zip
            runtime_platform: windows-arm64-cpu
            additional_runtime_platforms: ""
          - name: macOS arm64 zip
            platform: macos-arm64
            runner: macos-15
            archive_stem: trapo-workbench-macos-arm64
            archive_ext: zip
            runtime_platform: macos-arm64-metal
            additional_runtime_platforms: ""
          - name: Ubuntu 24.04 x64 tarball
            platform: linux-x64
            runner: ubuntu-24.04
            archive_stem: trapo-workbench-linux-x64
            archive_ext: tar.gz
            runtime_platform: linux-x86_64-cuda13
            additional_runtime_platforms: linux-x86_64-cpu
          - name: Ubuntu 24.04 arm64 tarball
            platform: linux-arm64
            runner: ubuntu-24.04-arm
            archive_stem: trapo-workbench-linux-arm64
            archive_ext: tar.gz
            runtime_platform: linux-arm64-cpu
            additional_runtime_platforms: ""
    env:
      DUCKDB_DOWNLOAD_LIB: "1"
      TRAPO_PDFIUM_RELEASE: chromium/7920
      TRAPO_RUNTIME_VERSION: ${{ needs.validate_tag.outputs.version }}
      TRAPO_VERSION: ${{ needs.validate_tag.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          lfs: true
          persist-credentials: false
          submodules: recursive

      - name: Validate release version
        shell: bash
        run: |
          test -n "$TRAPO_VERSION"
          echo "Release version $TRAPO_VERSION"

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Export Trapo OpenAPI
        run: cargo run -p trapo-server --bin export-openapi -- src/trapo-server/openapi/trapo.openapi.json

      - name: Package Trapo workbench
        env:
          GH_TOKEN: ${{ github.token }}
          TRAPO_GIT_TAG: ${{ env.TRAPO_VERSION }}
          TRAPO_GIT_SHA: ${{ github.sha }}
        shell: bash
        run: |
          python scripts/package_trapo_workbench.py \
            --version "$TRAPO_VERSION" \
            --platform "${{ matrix.platform }}" \
            --runtime-version "$TRAPO_RUNTIME_VERSION" \
            --runtime-platform "${{ matrix.runtime_platform }}" \
            --additional-runtime-platforms "${{ matrix.additional_runtime_platforms }}" \
            --pdfium-release "$TRAPO_PDFIUM_RELEASE"

      - name: Smoke packaged Trapo server on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $archive = "dist\${{ matrix.archive_stem }}-$env:TRAPO_VERSION.${{ matrix.archive_ext }}"
          if (-not (Test-Path $archive)) { throw "release archive was not produced: $archive" }
          $extract = Join-Path $env:RUNNER_TEMP "trapo-smoke"
          Remove-Item -LiteralPath $extract -Recurse -Force -ErrorAction SilentlyContinue
          Expand-Archive -LiteralPath $archive -DestinationPath $extract -Force
          $exe = Get-ChildItem -LiteralPath $extract -Recurse -Filter "trapo-server.exe" | Select-Object -First 1
          if (-not $exe) { throw "trapo-server.exe not found in archive" }
          $pdfium = Join-Path $exe.Directory.FullName "thirdparty\pdfium\bin\pdfium.dll"
          if (-not (Test-Path $pdfium)) { throw "bundled PDFium was not found at $pdfium" }
          & $exe.FullName --version
          $stdoutPath = Join-Path $env:RUNNER_TEMP "trapo-server.stdout.log"
          $stderrPath = Join-Path $env:RUNNER_TEMP "trapo-server.stderr.log"
          $process = Start-Process -FilePath $exe.FullName -ArgumentList "--port", "8770", "--no-browser" -WorkingDirectory $exe.Directory.FullName -RedirectStandardOutput $stdoutPath -RedirectStandardError $stderrPath -WindowStyle Hidden -PassThru
          try {
            $health = $null
            for ($attempt = 1; $attempt -le 60; $attempt++) {
              $process.Refresh()
              if ($process.HasExited) { throw "trapo-server exited early with code $($process.ExitCode)" }
              try {
                $health = Invoke-RestMethod -Uri "http://127.0.0.1:8770/api/health" -TimeoutSec 2
                if ($health.ok -eq $true) { break }
              } catch { Start-Sleep -Milliseconds 500 }
            }
            if ($health.ok -ne $true) { throw "health check failed" }
            Invoke-RestMethod -Uri "http://127.0.0.1:8770/api/status" -TimeoutSec 2 | Out-Null
            Invoke-RestMethod -Uri "http://127.0.0.1:8770/api/openapi.json" -TimeoutSec 2 | Out-Null
            Invoke-WebRequest -Uri "http://127.0.0.1:8770/" -UseBasicParsing | Out-Null
            if (-not (Test-Path (Join-Path $exe.Directory.FullName "data\trapo.duckdb"))) { throw "trapo.duckdb was not created" }
            if (-not (Test-Path (Join-Path $exe.Directory.FullName "logs\trapo-server.log"))) { throw "server log was not created" }
          } finally {
            Stop-Process -Id $process.Id -Force -ErrorAction SilentlyContinue
          }

      - name: Smoke packaged Trapo server on Unix
        if: runner.os != 'Windows'
        shell: bash
        run: |
          archive="dist/${{ matrix.archive_stem }}-$TRAPO_VERSION.${{ matrix.archive_ext }}"
          test -f "$archive"
          extract="$RUNNER_TEMP/trapo-smoke"
          rm -rf "$extract"
          mkdir -p "$extract"
          case "$archive" in
            *.zip) unzip -q "$archive" -d "$extract" ;;
            *.tar.gz) tar -xzf "$archive" -C "$extract" ;;
            *) echo "unsupported archive: $archive" >&2; exit 1 ;;
          esac
          exe="$(find "$extract" -name trapo-server -type f | head -n 1)"
          test -n "$exe"
          chmod +x "$exe"
          app_root="$(dirname "$exe")"
          test -f "$app_root/thirdparty/pdfium/lib/${{ runner.os == 'macOS' && 'libpdfium.dylib' || 'libpdfium.so' }}"
          test -f "$app_root/${{ runner.os == 'macOS' && 'libduckdb.dylib' || 'libduckdb.so' }}"
          test -d "$app_root/thirdparty/uocr-runtime/${{ matrix.runtime_platform }}"
          stdout="$RUNNER_TEMP/trapo.stdout.log"
          stderr="$RUNNER_TEMP/trapo.stderr.log"
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            export DYLD_LIBRARY_PATH="$app_root:$app_root/thirdparty/pdfium/lib:${DYLD_LIBRARY_PATH:-}"
          else
            export LD_LIBRARY_PATH="$app_root:$app_root/thirdparty/pdfium/lib:${LD_LIBRARY_PATH:-}"
          fi
          (cd "$app_root" && ./trapo-server --version)
          (cd "$app_root" && ./trapo-server --port 8771 --no-browser >"$stdout" 2>"$stderr") &
          pid=$!
          trap 'kill "$pid" 2>/dev/null || true' EXIT
          for _ in $(seq 1 60); do
            if curl -fsS http://127.0.0.1:8771/api/health >/tmp/trapo-health.json; then
              break
            fi
            if ! kill -0 "$pid" 2>/dev/null; then
              cat "$stdout" "$stderr" || true
              exit 1
            fi
            sleep 0.5
          done
          curl -fsS http://127.0.0.1:8771/ >/tmp/trapo-home.html
          curl -fsS http://127.0.0.1:8771/api/status >/tmp/trapo-status.json
          curl -fsS http://127.0.0.1:8771/api/openapi.json >/tmp/trapo-openapi.json
          test -f "$app_root/data/trapo.duckdb"
          test -f "$app_root/logs/trapo-server.log"

      - name: Upload Trapo workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: trapo-workbench-${{ matrix.platform }}-${{ env.TRAPO_VERSION }}
          path: |
            dist/${{ matrix.archive_stem }}-${{ env.TRAPO_VERSION }}.${{ matrix.archive_ext }}
            dist/${{ matrix.archive_stem }}-${{ env.TRAPO_VERSION }}.${{ matrix.archive_ext }}.sha256
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    needs:
      - validate_tag
      - package
      - package_trapo
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
    env:
      UOCR_VERSION: ${{ needs.validate_tag.outputs.version }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download packaged artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          notes="$(mktemp)"
          cat > "$notes" <<EOF
          Unlimited-OCR Workbench $UOCR_VERSION

          Legacy Drogon/C++ portable app artifacts:
          - Windows x64: uocr-workbench-windows-x64-$UOCR_VERSION.zip
          - macOS arm64: uocr-workbench-macos-arm64-$UOCR_VERSION.zip
          - Ubuntu 24.04 x64: uocr-workbench-linux-x64-$UOCR_VERSION.tar.gz
          - Ubuntu 24.04 arm64: uocr-workbench-linux-arm64-$UOCR_VERSION.tar.gz

          Trapo Rust/Axum portable app artifacts:
          - Windows x64: trapo-workbench-windows-x64-$UOCR_VERSION.zip
          - Windows arm64: trapo-workbench-windows-arm64-$UOCR_VERSION.zip
          - macOS arm64: trapo-workbench-macos-arm64-$UOCR_VERSION.zip
          - Ubuntu 24.04 x64: trapo-workbench-linux-x64-$UOCR_VERSION.tar.gz
          - Ubuntu 24.04 arm64: trapo-workbench-linux-arm64-$UOCR_VERSION.tar.gz

          Native runtime artifacts are also attached as uocr-runtime-* assets and are built before packaging.

          Extract the archive, run the bundled launcher, then open http://127.0.0.1:8765/.
          Legacy logs are written to logs/uocr-server.log; Trapo logs are written to logs/trapo-server.log.
          EOF
          if ! gh release view "$UOCR_VERSION" >/dev/null 2>&1; then
            gh release create "$UOCR_VERSION" --target "$GITHUB_SHA" --title "Unlimited-OCR Workbench $UOCR_VERSION" --notes-file "$notes"
          else
            gh release edit "$UOCR_VERSION" --title "Unlimited-OCR Workbench $UOCR_VERSION" --notes-file "$notes"
          fi
          mapfile -t files < <(find dist -type f \( -name '*.zip' -o -name '*.tar.gz' -o -name '*.sha256' \) | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release files found." >&2
            exit 1
          fi
          gh release upload "$UOCR_VERSION" "${files[@]}" --clobber

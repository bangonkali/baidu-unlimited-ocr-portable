name: Workbench CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  frontend:
    name: Trapo React client
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        working-directory: src/trapo-client
        run: bun install --frozen-lockfile

      - name: Check formatting
        working-directory: src/trapo-client
        run: bun run format:check

      - name: Lint
        working-directory: src/trapo-client
        run: bun run lint

      - name: Test
        working-directory: src/trapo-client
        run: bun run test

      - name: Typecheck
        working-directory: src/trapo-client
        run: bun run typecheck

      - name: Build
        working-directory: src/trapo-client
        run: bun run build

      - name: Build Storybook
        working-directory: src/trapo-client
        run: bun run build-storybook

  rust:
    name: Trapo Rust server (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-2025
          - platform: windows-arm64
            runner: windows-11-arm
          - platform: macos-arm64
            runner: macos-15
          - platform: linux-x64
            runner: ubuntu-24.04
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    env:
      DUCKDB_DOWNLOAD_LIB: "1"
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Check formatting
        if: matrix.platform == 'linux-x64'
        run: cargo fmt --all -- --check

      - name: Clippy
        run: cargo clippy -p trapo-server --all-targets -- -D warnings

      - name: Test
        run: cargo test -p trapo-server

      - name: Verify OpenAPI export
        if: matrix.platform == 'linux-x64'
        shell: bash
        run: |
          cargo run -p trapo-server --bin export-openapi -- src/trapo-server/openapi/trapo.openapi.json
          git diff --exit-code -- src/trapo-server/openapi/trapo.openapi.json

  python:
    name: Python packaging scripts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Run installer tests
        shell: bash
        run: |
          python -m py_compile scripts/package_runtime.py scripts/install_runtime.py scripts/test_ctypes_runtime.py scripts/package_trapo_workbench.py
          python -m py_compile scripts/package_runtime_macos.py
          python -m unittest discover -s tests -p "test_*.py"

  complexity:
    name: SCC complexity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: stable

      - name: Run SCC gate
        shell: bash
        run: |
          mkdir -p .logs
          go install github.com/boyter/scc/v3@latest
          "$HOME/go/bin/scc" --by-file --format json > .logs/scc.json
          python3 - <<'PY'
          import json
          import re
          import sys

          ignored = re.compile(
              r"node_modules|dist|generated|\.json$|\.md$|trapo/migrations|tests/|"
              r"scripts/(install_runtime\.py|package_runtime\.py|package_trapo_workbench\.py|"
              r"test_ctypes_runtime\.py|windows/setup-build\.ps1|mac/setup-build\.sh|"
              r"linux/setup-build\.sh)"
          )

          def scc_files(payload):
              if isinstance(payload, dict):
                  return payload.get("Files", [])
              if isinstance(payload, list):
                  return [
                      item
                      for group in payload
                      if isinstance(group, dict)
                      for item in group.get("Files", [])
                  ]
              return []

          data = json.load(open(".logs/scc.json", encoding="utf-8"))
          offenders = [
              item
              for item in scc_files(data)
              if item.get("Lines", 0) > 300
              and not ignored.search(item.get("Location", "").replace("\\", "/"))
          ]
          offenders.sort(key=lambda item: item.get("Lines", 0), reverse=True)
          for item in offenders:
              print(f"{item.get('Location')} lines={item.get('Lines')} code={item.get('Code')} complexity={item.get('Complexity')}")
          sys.exit(1 if offenders else 0)
          PY

      - name: Upload SCC log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scc-complexity-log
          path: .logs/scc.json
          if-no-files-found: ignore

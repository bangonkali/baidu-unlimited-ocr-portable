name: Workbench CI

on:
  workflow_call:

permissions:
  contents: read

jobs:
  skylos:
    name: Skylos first-party triage
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14.6"

      - name: Install Skylos
        run: python -m pip install --disable-pip-version-check --only-binary=:all: skylos==4.27.0

      - name: Run Skylos quality gate
        run: python scripts/quality.py --profile ci --only skylos --github --report-dir .logs/quality/skylos

      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-skylos
          path: .logs/quality/skylos/**
          if-no-files-found: error

  frontend:
    name: Trapo React client
    runs-on: ubuntu-24.04
    timeout-minutes: 25
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14.6"

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Run frontend quality gate
        run: python scripts/quality.py --profile ci --only frontend --github --report-dir .logs/quality/frontend

      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-frontend
          path: .logs/quality/frontend/**
          if-no-files-found: error

  rust:
    name: Trapo Rust server (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-x64
            runner: windows-2025
          - platform: windows-arm64
            runner: windows-11-arm
          - platform: macos-arm64
            runner: macos-15
          - platform: linux-x64
            runner: ubuntu-24.04
          - platform: linux-arm64
            runner: ubuntu-24.04-arm
    env:
      DUCKDB_DOWNLOAD_LIB: "1"
      TRAPO_RUST_PLATFORM: ${{ matrix.platform }}
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14.6"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30 # stable
        with:
          toolchain: stable

      - name: Run Rust quality gate
        run: python scripts/quality.py --profile ci --only rust --github --report-dir .logs/quality/rust-${{ matrix.platform }}

      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-rust-${{ matrix.platform }}
          path: .logs/quality/rust-${{ matrix.platform }}/**
          if-no-files-found: error

  python:
    name: Python packaging scripts
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14.6"

      - name: Install Python quality tools
        run: python -m pip install --disable-pip-version-check --only-binary=:all: ruff==0.15.20

      - name: Run Python quality gate
        run: python scripts/quality.py --profile ci --only python --github --report-dir .logs/quality/python

      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-python
          path: .logs/quality/python/**
          if-no-files-found: error

  complexity:
    name: SCC complexity
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14.6"

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: stable
          cache: false

      - name: Run SCC gate
        run: python scripts/quality.py --profile ci --only scc --github --report-dir .logs/quality/scc

      - name: Upload quality logs
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
        with:
          name: quality-scc
          path: .logs/quality/scc/**
          if-no-files-found: error

name: Build runtime binaries

on:
  workflow_call:
    inputs:
      publish:
        description: "Publish artifacts to a GitHub Release"
        required: false
        default: false
        type: boolean
      version:
        description: "Release tag/version to use when publishing outside a direct tag context."
        required: false
        default: ""
        type: string
      cuda_version:
        description: "CUDA toolkit version installed for CUDA builds"
        required: false
        default: "13.2.0"
        type: string
      cuda_architectures:
        description: "CMAKE_CUDA_ARCHITECTURES for CUDA release builds. The default matches llama.cpp's GPU-less CUDA 13 fallback."
        required: false
        default: "75-virtual;80-virtual;86-real;89-real;90-virtual;120a-real;121a-real"
        type: string
      cuda_build_parallel:
        description: "Maximum parallel build jobs for CUDA matrix entries"
        required: false
        default: "2"
        type: string

permissions:
  contents: read

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-arm64-metal
            runner: macos-15
            backend: metal
            build_parallel: 3
          - platform: linux-x86_64-cuda13
            runner: ubuntu-24.04
            backend: cuda
            build_parallel: 2
          - platform: linux-x86_64-cpu
            runner: ubuntu-24.04
            backend: cpu
            build_parallel: 3
          - platform: linux-arm64-cpu
            runner: ubuntu-24.04-arm
            backend: cpu
            build_parallel: 3
          - platform: windows-x86_64-cuda13
            runner: windows-2025
            backend: cuda
            build_parallel: 2
          - platform: windows-x86_64-cpu
            runner: windows-2025
            backend: cpu
            build_parallel: 3
          - platform: windows-arm64-cpu
            runner: windows-11-arm
            backend: cpu
            build_parallel: 3

    env:
      CUDA_VERSION: ${{ inputs.cuda_version || '13.2.0' }}
      CUDA_ARCHITECTURES: ${{ inputs.cuda_architectures || '75-virtual;80-virtual;86-real;89-real;90-virtual;120a-real;121a-real' }}
      BUILD_PARALLEL: ${{ matrix.backend == 'cuda' && (inputs.cuda_build_parallel || '2') || matrix.build_parallel }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false
          submodules: recursive

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Install CMake with Blackwell CUDA architecture support
        run: |
          python -m pip install --upgrade "cmake>=4.2.1,<5"
        shell: bash

      - name: Set runtime version
        run: |
          python scripts/package_runtime.py write-version-env --github-env "$GITHUB_ENV" --ref-type "$GITHUB_REF_TYPE" --ref-name "$GITHUB_REF_NAME" --sha "$GITHUB_SHA" --input-version "${{ inputs.version }}"
        shell: bash

      - name: Install CUDA toolkit
        if: matrix.backend == 'cuda'
        uses: Jimver/cuda-toolkit@v0.2.35
        with:
          cuda: ${{ env.CUDA_VERSION }}
          method: network

      - name: Show build toolchain
        shell: bash
        run: |
          cmake --version
          python --version
          if command -v nvcc >/dev/null 2>&1; then
            nvcc --version
            echo "CUDA_ARCHITECTURES=${CUDA_ARCHITECTURES}"
          fi
          echo "BUILD_PARALLEL=${BUILD_PARALLEL}"

      - name: Configure Metal build
        if: matrix.backend == 'metal'
        run: |
          cmake -B thirdparty/llama.cpp/build \
            -S thirdparty/llama.cpp \
            -DGGML_METAL=ON \
            -DGGML_NATIVE=OFF \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure CUDA build on Linux
        if: matrix.backend == 'cuda' && runner.os == 'Linux'
        run: |
          cmake -B thirdparty/llama.cpp/build \
            -S thirdparty/llama.cpp \
            -DGGML_CUDA=ON \
            -DGGML_NATIVE=OFF \
            "-DCMAKE_CUDA_ARCHITECTURES=${CUDA_ARCHITECTURES}" \
            -DCMAKE_BUILD_TYPE=Release

      - name: Configure CUDA build on Windows
        if: matrix.backend == 'cuda' && runner.os == 'Windows'
        run: |
          cmake -B thirdparty/llama.cpp/build `
            -S thirdparty/llama.cpp `
            -DGGML_CUDA=ON `
            -DGGML_NATIVE=OFF `
            "-DCMAKE_CUDA_ARCHITECTURES=$env:CUDA_ARCHITECTURES" `
            -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Configure CPU build on Unix
        if: matrix.backend == 'cpu' && runner.os != 'Windows'
        run: |
          cmake -B thirdparty/llama.cpp/build \
            -S thirdparty/llama.cpp \
            -DGGML_NATIVE=OFF \
            -DCMAKE_BUILD_TYPE=Release
        shell: bash

      - name: Configure CPU build on Windows ARM64
        if: matrix.backend == 'cpu' && matrix.platform == 'windows-arm64-cpu'
        run: |
          cmake -B thirdparty/llama.cpp/build `
            -S thirdparty/llama.cpp `
            -A ARM64 `
            -T ClangCL `
            -DGGML_NATIVE=OFF `
            -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Configure CPU build on Windows
        if: matrix.backend == 'cpu' && runner.os == 'Windows' && matrix.platform != 'windows-arm64-cpu'
        run: |
          cmake -B thirdparty/llama.cpp/build `
            -S thirdparty/llama.cpp `
            -DGGML_NATIVE=OFF `
            -DCMAKE_BUILD_TYPE=Release
        shell: pwsh

      - name: Build runtime targets
        shell: bash
        run: |
          cmake --build thirdparty/llama.cpp/build --config Release --target llama-mtmd-cli llama-uocr-parity llama-server uocr-ffi --parallel "${BUILD_PARALLEL:-2}"

      - name: Validate FFI ABI
        run: |
          set +e
          python scripts/test_ctypes_runtime.py --abi-only > abi-validation.json
          status=$?
          cat abi-validation.json
          if [ "$status" -eq 0 ]; then
            exit 0
          fi
          python - <<'PY'
          import json
          import sys

          try:
              payload = json.load(open("abi-validation.json", encoding="utf-8"))
          except Exception:
              raise SystemExit(1)

          if payload.get("symbol_validation") is True and payload.get("load_error"):
              print("ABI exports validated; CUDA loader dependency is unavailable on this hosted runner.")
              raise SystemExit(0)
          raise SystemExit(1)
          PY
        shell: bash

      - name: Package runtime
        run: |
          python scripts/package_runtime.py package --platform "${{ matrix.platform }}" --version "${{ env.UOCR_RUNTIME_VERSION }}" --output-dir dist
        shell: bash

      - name: Upload packaged runtime
        uses: actions/upload-artifact@v4
        with:
          name: runtime-${{ matrix.platform }}
          path: |
            dist/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    if: github.ref_type == 'tag' || inputs.publish == true
    permissions:
      contents: write
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14.6"

      - name: Download packaged runtimes
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Set release tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            tag="${GITHUB_REF_NAME}"
          else
            tag="${{ inputs.version }}"
          fi
          if [[ -z "$tag" ]]; then
            echo "Publishing runtime assets requires a tag ref or the version input." >&2
            exit 1
          fi
          echo "UOCR_RELEASE_TAG=${tag//\//-}" >> "$GITHUB_ENV"

      - name: Merge runtime manifests
        run: |
          python scripts/package_runtime.py merge --input-dir dist --output dist/uocr-runtime-manifest.json

      - name: Publish release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          release_notes="$(mktemp)"
          cat > "$release_notes" <<'EOF'
          Prebuilt Unlimited-OCR native runtime binaries.

          Supported platform labels:
          - macos-arm64-metal
          - linux-x86_64-cuda13
          - linux-x86_64-cpu
          - linux-arm64-cpu
          - windows-x86_64-cuda13
          - windows-x86_64-cpu
          - windows-arm64-cpu

          GGUF model files are downloaded separately by the setup scripts from Hugging Face.
          EOF

          if ! gh release view "$UOCR_RELEASE_TAG" >/dev/null 2>&1; then
            gh release create "$UOCR_RELEASE_TAG" --target "$GITHUB_SHA" --title "Runtime binaries $UOCR_RELEASE_TAG" --notes-file "$release_notes"
          fi

          mapfile -t files < <(find dist -type f \( -name '*.tar.gz' -o -name '*.zip' -o -name '*.sha256' -o -name 'uocr-runtime-manifest.json' \) | sort)
          if [[ "${#files[@]}" -eq 0 ]]; then
            echo "No release files found." >&2
            exit 1
          fi
          gh release upload "$UOCR_RELEASE_TAG" "${files[@]}" --clobber
